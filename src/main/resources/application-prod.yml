# ============================================================
# Perfil PROD — despliegue en la nube (Render).
# Se activa con SPRING_PROFILES_ACTIVE=prod.
# NO tiene valores por defecto: si falta una variable obligatoria,
# la aplicación NO arranca (mejor que arrancar con datos inseguros).
# ============================================================

spring:
  r2dbc:
    url: ${SPRING_R2DBC_URL}
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}

# OBLIGATORIO: el MISMO valor que el JWT_SECRET del auth-service.
jwt:
  secret: ${JWT_SECRET}

# Orígenes permitidos separados por coma (ej: https://vendingcom-app.onrender.com)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

# En producción la documentación OpenAPI queda APAGADA por defecto (no exponer el esquema sin token).
# Si en algún despliegue se necesitara, se reactiva con SPRINGDOC_ENABLED=true.
springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}

logging:
  level:
    org.springframework.r2dbc: ${LOGGING_LEVEL_R2DBC:INFO}
    com.vendingcom.machine_service: ${LOGGING_LEVEL_APP:INFO}
